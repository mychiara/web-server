<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wake-on-LAN Controller - Server Dashboard</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=13">
    <style>
        .wol-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
            align-items: start;
            margin-top: 1rem;
        }

        @media (max-width: 992px) {
            .wol-layout {
                grid-template-columns: 1fr;
            }
        }

        .device-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
        }

        .device-table th, .device-table td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .device-table th {
            color: var(--text-muted);
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .device-table td {
            font-size: 0.88rem;
        }

        .device-mac {
            font-family: monospace;
            color: #58a6ff;
        }

        .form-group {
            margin-bottom: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            width: 100%;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .pulse-btn {
            position: relative;
            overflow: hidden;
        }

        .pulse-btn.loading i {
            animation: pulse-wave 1.2s infinite ease-in-out;
        }

        @keyframes pulse-wave {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.5;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="wallpaper"></div>

    <div class="app-container">
        <!-- Top Bar -->
        <header class="top-bar">
            <div style="display:flex; align-items:center; gap:1.25rem">
                <button class="btn" onclick="window.location.href='/dashboard'" title="Kembali ke Dashboard">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <div class="clock-widget" style="margin-left:0.5rem">
                    <h2 style="font-weight:600; font-size:1.4rem; display:flex; align-items:center; gap:0.8rem">
                        <i class="fa-solid fa-laptop-medical" style="color:var(--cpu-color)"></i> Wake-on-LAN Controller
                    </h2>
                </div>
            </div>
            <div class="system-status">
                <div class="status-item">
                    <i class="fa-solid fa-wifi"></i>
                    <span>UDP Broadcast 255.255.255.255</span>
                </div>
            </div>
        </header>

        <!-- Main Layout -->
        <div class="wol-layout">
            <!-- Left Card: Saved Devices List -->
            <div class="widget-card glass" style="padding: 2rem; justify-content: flex-start; align-items: stretch;">
                <div class="widget-header">
                    <div class="icon-box" style="box-shadow: 0 0 10px rgba(59, 130, 246, 0.2)">
                        <i class="fa-solid fa-list" style="color:var(--cpu-color)"></i>
                    </div>
                    <div>
                        <h3>Daftar Perangkat Terdaftar</h3>
                        <p style="font-size:0.75rem; color:var(--text-muted); margin-top:0.1rem">Nyalakan komputer lain dalam satu jaringan lokal secara instan</p>
                    </div>
                </div>

                <div style="overflow-x: auto; width: 100%">
                    <table class="device-table">
                        <thead>
                            <tr>
                                <th>Nama Perangkat</th>
                                <th>MAC Address</th>
                                <th>IP Address (Opsional)</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="device-list">
                            <tr>
                                <td colspan="4" style="text-align: center; color: var(--text-muted); padding: 2rem;">
                                    <i class="fa-solid fa-spinner fa-spin" style="font-size: 1.5rem; margin-bottom: 0.5rem;"></i>
                                    <div>Memuat daftar perangkat...</div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Right Card: Add Device Form -->
            <div class="widget-card glass" style="padding: 1.5rem; justify-content: flex-start; align-items: stretch;">
                <div class="widget-header" style="margin-bottom: 1.5rem;">
                    <div class="icon-box" style="box-shadow: 0 0 10px rgba(16, 185, 129, 0.2)">
                        <i class="fa-solid fa-plus" style="color:#10b981"></i>
                    </div>
                    <h3>Tambah Perangkat Baru</h3>
                </div>

                <form id="add-device-form" onsubmit="addDevice(event)" style="width: 100%">
                    <!-- Device Name -->
                    <div class="form-group">
                        <label for="dev-name">Nama Perangkat</label>
                        <input type="text" id="dev-name" placeholder="Contoh: PC-Gaming-Kamar" required>
                    </div>

                    <!-- MAC Address -->
                    <div class="form-group">
                        <label for="dev-mac">MAC Address</label>
                        <input type="text" id="dev-mac" placeholder="Contoh: AA:BB:CC:DD:EE:FF" pattern="^([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})$" required>
                    </div>

                    <!-- IP Address -->
                    <div class="form-group">
                        <label for="dev-ip">IP Address (Opsional)</label>
                        <input type="text" id="dev-ip" placeholder="Contoh: 192.168.1.50">
                    </div>

                    <button type="submit" class="btn success" style="width: 100%; margin-top: 1rem; padding: 0.75rem;">
                        <i class="fa-solid fa-floppy-disk"></i> Simpan Perangkat
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Load saved devices
        async function loadDevices() {
            try {
                const res = await fetch('/api/wol/devices');
                const data = await res.json();

                const listBody = document.getElementById('device-list');
                if (data.success) {
                    if (data.devices.length === 0) {
                        listBody.innerHTML = `
                            <tr>
                                <td colspan="4" style="text-align: center; color: var(--text-muted); padding: 3rem;">
                                    <i class="fa-solid fa-laptop-code" style="font-size: 2.2rem; margin-bottom: 0.8rem; color: var(--text-muted)"></i>
                                    <div>Belum ada perangkat terdaftar.</div>
                                    <div style="font-size: 0.78rem; margin-top: 0.2rem">Tambahkan perangkat baru menggunakan form di sebelah kanan.</div>
                                </td>
                            </tr>
                        `;
                    } else {
                        listBody.innerHTML = data.devices.map(dev => `
                            <tr>
                                <td style="font-weight: 600">${dev.name}</td>
                                <td><span class="device-mac">${dev.mac}</span></td>
                                <td>${dev.ip || '<span style="color: var(--text-muted)">N/A</span>'}</td>
                                <td>
                                    <div style="display: flex; gap: 0.5rem">
                                        <button class="btn primary pulse-btn" id="btn-wake-${dev.id}" onclick="wakeDevice('${dev.mac}', '${dev.id}')" title="Kirim Sinyal Nyalakan (WOL)">
                                            <i class="fa-solid fa-power-off"></i> Nyalakan
                                        </button>
                                        <button class="btn danger" onclick="removeDevice('${dev.id}')" title="Hapus Perangkat">
                                            <i class="fa-solid fa-trash-can"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        `).join('');
                    }
                }
            } catch (err) {
                console.error(err);
            }
        }

        // Add device
        async function addDevice(e) {
            e.preventDefault();

            const name = document.getElementById('dev-name').value;
            const mac = document.getElementById('dev-mac').value.toUpperCase();
            const ip = document.getElementById('dev-ip').value;

            try {
                const res = await fetch('/api/wol/devices/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, mac, ip })
                });
                const data = await res.json();

                if (data.success) {
                    alert(data.message);
                    document.getElementById('add-device-form').reset();
                    loadDevices();
                } else {
                    alert('Gagal menambahkan: ' + data.error);
                }
            } catch (err) {
                console.error(err);
                alert('Gagal mengirim data.');
            }
        }

        // Remove device
        async function removeDevice(id) {
            if (!confirm('Apakah Anda yakin ingin menghapus perangkat ini?')) return;

            try {
                const res = await fetch('/api/wol/devices/remove', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                const data = await res.json();

                if (data.success) {
                    loadDevices();
                } else {
                    alert('Gagal menghapus: ' + data.error);
                }
            } catch (err) {
                console.error(err);
            }
        }

        // Wake device
        async function wakeDevice(mac, id) {
            const btn = document.getElementById(`btn-wake-${id}`);
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                const res = await fetch('/api/wol/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mac })
                });
                const data = await res.json();

                if (data.success) {
                    alert(data.message);
                } else {
                    alert('Gagal mengirim paket: ' + data.error);
                }
            } catch (err) {
                console.error(err);
                alert('Gagal memproses permintaan.');
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        // Initial load
        document.addEventListener('DOMContentLoaded', loadDevices);
    </script>
</body>

</html>
