<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Admin Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(-45deg, #ffdde1, #ee9ca7, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 1.5rem;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.08);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 12px;
            font-weight: 700;
            color: #1e293b;
        }

        p {
            color: #64748b;
            font-size: 0.92rem;
            font-weight: 500;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(0, 0, 0, 0.08);
            color: #1e293b;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.35);
        }

        .error {
            background: #fef2f2;
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 10px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 0.88rem;
            font-weight: 500;
            display: none;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Welcome! 👋</h2>
        <p>Please create your administrator account to secure this dashboard.</p>

        <form id="setupForm">
            <input type="text" id="username" placeholder="Username (e.g. admin)" required>
            <input type="password" id="password" placeholder="New Password" required minlength="4">
            <input type="password" id="confirm_password" placeholder="Confirm Password" required minlength="4">
            <button type="submit" id="btn-submit">Create Account & Login</button>
            <div class="error" id="error-msg"></div>
        </form>
    </div>

    <script>
        document.getElementById('setupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            const btn = document.getElementById('btn-submit');
            const err = document.getElementById('error-msg');

            if (pass !== confirm) {
                err.innerText = "Passwords do not match!";
                err.style.display = 'block';
                return;
            }

            btn.innerText = "Saving...";
            err.style.display = 'none';

            try {
                const res = await fetch('/api/setup-admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();

                if (data.success) {
                    window.location.href = '/'; // Go to dashboard
                } else {
                    err.innerText = data.error || "Setup failed";
                    err.style.display = 'block';
                    btn.innerText = "Create Account & Login";
                }
            } catch (e) {
                err.innerText = "Connection error";
                err.style.display = 'block';
                btn.innerText = "Create Account & Login";
            }
        });
    </script>
</body>

</html>
