<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery - Server Dashboard</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=13">
    <style>
        /* Sidebar and Gallery grid layout override/extension */
        .gallery-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 2rem;
            align-items: start;
            margin-top: 1rem;
        }

        @media (max-width: 992px) {
            .gallery-layout {
                grid-template-columns: 1fr;
            }
        }

        .gallery-card {
            padding: 1.5rem;
            min-height: auto;
        }

        .gallery-title-bar {
            border-left: 4px solid var(--cpu-color);
            padding-left: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .gallery-title-bar h2 {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        /* Preset select and inputs */
        .form-group {
            margin-bottom: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            user-select: none;
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--text-main);
        }

        /* Photo Grid styling */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
        }

        .photo-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: var(--radius-md);
            overflow: hidden;
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            cursor: pointer;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s ease;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .photo-item:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 28px rgba(31, 38, 135, 0.12);
        }

        .photo-item:hover img {
            transform: scale(1.08);
        }

        .photo-info-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(15, 23, 42, 0.85), transparent);
            padding: 1rem 0.8rem 0.5rem;
            color: white;
            font-size: 0.75rem;
            opacity: 0;
            transition: opacity 0.25s ease;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            pointer-events: none;
        }

        .photo-item:hover .photo-info-overlay {
            opacity: 1;
        }

        .photo-name {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .photo-meta {
            opacity: 0.75;
            display: flex;
            justify-content: space-between;
        }

        /* Lightbox styling */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 2000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            transition: all 0.25s;
            z-index: 2100;
        }

        .lightbox-close:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
            color: #ef4444;
            transform: scale(1.05);
        }

        .lightbox-main {
            position: relative;
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            max-height: calc(100vh - 120px);
        }

        .lightbox-img {
            max-width: 90%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s cubic-bezier(0.15, 0.45, 0.3, 1);
            transform-origin: center;
            user-select: none;
            -webkit-user-drag: none;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.25s;
            z-index: 2050;
        }

        .lightbox-nav:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-50%) scale(1.05);
        }

        .lightbox-prev {
            left: 2rem;
        }

        .lightbox-next {
            right: 2rem;
        }

        .lightbox-bottom-bar {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #f8fafc;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 2010;
        }

        .lightbox-title-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            max-width: 60%;
        }

        .lightbox-title {
            font-weight: 600;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .lightbox-subtitle {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .lightbox-controls {
            display: flex;
            gap: 0.8rem;
        }

        .lightbox-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .lightbox-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateY(-1px);
        }

        /* Empty state style */
        .empty-gallery {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 6rem 2rem;
            color: var(--text-muted);
            text-align: center;
            gap: 1.5rem;
        }

        .empty-gallery i {
            font-size: 4rem;
            color: var(--text-muted);
            opacity: 0.5;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.05); opacity: 0.7; }
            100% { transform: scale(1); opacity: 0.4; }
        }

        .empty-gallery h3 {
            font-size: 1.2rem;
            color: var(--text-main);
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="wallpaper"></div>

    <div class="app-container">
        <!-- Top Bar / Navigation -->
        <header class="top-bar">
            <div style="display:flex; align-items:center; gap:1.25rem">
                <button class="btn" onclick="window.location.href='/dashboard'" title="Kembali ke Dashboard">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <div class="clock-widget" style="margin-left:0.5rem">
                    <h2 style="font-weight:600; font-size:1.4rem; display:flex; align-items:center; gap:0.8rem">
                        <i class="fa-solid fa-images" style="color:var(--cpu-color)"></i> Photo Gallery
                    </h2>
                </div>
            </div>
            <div class="system-status">
                <div class="status-item">
                    <i class="fa-solid fa-folder-open"></i>
                    <span id="current-scan-label">Ready</span>
                </div>
            </div>
        </header>

        <!-- Main Layout Split -->
        <div class="gallery-layout">
            <!-- Left Panel: Controls / Settings -->
            <div class="widget-card glass gallery-card">
                <div class="widget-header">
                    <div class="icon-box" style="box-shadow: 0 0 10px rgba(59, 130, 246, 0.2)">
                        <i class="fa-solid fa-sliders" style="color:var(--net-color)"></i>
                    </div>
                    <h3>Pengaturan Galeri</h3>
                </div>

                <div class="widget-body" style="align-items:stretch; justify-content:flex-start; margin-top:1.5rem; width:100%">
                    <!-- Preset Selector -->
                    <div class="form-group">
                        <label for="preset-select">Pilih Folder Preset</label>
                        <select id="preset-select" onchange="applyPreset(this.value)">
                            <option value="/mnt/data/MobileBackup">Mobile Backup Sync (/mnt/data/MobileBackup)</option>
                            <option value="/var/www">Web Server Directory (/var/www)</option>
                            <option value="custom" selected>Masukkan Path Kustom</option>
                        </select>
                    </div>

                    <!-- Custom Path Input -->
                    <div class="form-group">
                        <label for="path-input">Lokasi Direktori (Path Absolute)</label>
                        <input type="text" id="path-input" placeholder="Contoh: /mnt/data/MobileBackup" value="/mnt/data/MobileBackup">
                    </div>

                    <!-- Scan Recursively Option -->
                    <div class="form-group" style="margin-top:0.5rem; margin-bottom:1.5rem">
                        <label class="form-checkbox">
                            <input type="checkbox" id="recursive-checkbox" checked>
                            Pencarian Rekursif (Scan Subfolder)
                        </label>
                    </div>

                    <!-- Action Button -->
                    <button class="btn primary" id="scan-btn" onclick="loadPhotos()" style="width:100%; padding:0.75rem">
                        <i class="fa-solid fa-magnifying-glass"></i> Pindai Folder Foto
                    </button>
                </div>
            </div>

            <!-- Right Panel: Grid Area -->
            <div class="widget-card glass gallery-card" style="min-height: 480px; justify-content: flex-start; padding: 2rem">
                <div class="gallery-title-bar">
                    <h2 id="gallery-header-title">Semua Foto</h2>
                    <span id="photo-count-badge" class="btn" style="pointer-events:none; font-weight:700">0 Foto</span>
                </div>

                <!-- Empty State -->
                <div id="empty-state" class="empty-gallery">
                    <i class="fa-solid fa-images"></i>
                    <div>
                        <h3>Belum Ada Folder yang Dipindai</h3>
                        <p style="margin-top:0.5rem">Tentukan lokasi direktori foto di panel sebelah kiri lalu klik tombol "Pindai Folder Foto".</p>
                    </div>
                </div>

                <!-- Photos Grid -->
                <div id="photos-container" class="photo-grid" style="display:none">
                    <!-- Photo items dynamic load -->
                </div>
            </div>
        </div>
    </div>

    <!-- Lightbox Backdrop / Modal -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()" title="Tutup (Esc)">
            <i class="fa-solid fa-xmark"></i>
        </button>

        <button class="lightbox-nav lightbox-prev" onclick="navigateLightbox(-1)" title="Foto Sebelumnya (⬅️)">
            <i class="fa-solid fa-chevron-left"></i>
        </button>

        <div class="lightbox-main" id="lightbox-main">
            <img src="" class="lightbox-img" id="lightbox-img" alt="Preview">
        </div>

        <button class="lightbox-nav lightbox-next" onclick="navigateLightbox(1)" title="Foto Selanjutnya (➡️)">
            <i class="fa-solid fa-chevron-right"></i>
        </button>

        <div class="lightbox-bottom-bar">
            <div class="lightbox-title-info">
                <span class="lightbox-title" id="lb-filename">file.jpg</span>
                <span class="lightbox-subtitle" id="lb-meta">/mnt/data/MobileBackup • 0.5 MB</span>
            </div>
            <div class="lightbox-controls">
                <button class="lightbox-btn" onclick="zoomImage(-1)" title="Perkecil">
                    <i class="fa-solid fa-magnifying-glass-minus"></i>
                </button>
                <button class="lightbox-btn" onclick="zoomImage(1)" title="Perbesar">
                    <i class="fa-solid fa-magnifying-glass-plus"></i>
                </button>
                <button class="lightbox-btn" onclick="resetZoom()" title="Reset Ukuran">
                    <i class="fa-solid fa-compress"></i>
                </button>
                <button class="lightbox-btn" onclick="downloadCurrentImage()" title="Unduh File">
                    <i class="fa-solid fa-download"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentPhotos = [];
        let activeIndex = -1;
        let currentZoom = 1;

        // Apply preset paths
        function applyPreset(val) {
            const pathInput = document.getElementById('path-input');
            if (val !== 'custom') {
                pathInput.value = val;
            }
        }

        // Fetch photos list from backend
        async function loadPhotos() {
            const scanBtn = document.getElementById('scan-btn');
            const path = document.getElementById('path-input').value.trim();
            const recursive = document.getElementById('recursive-checkbox').checked;

            if (!path) {
                alert('Tolong masukkan path direktori terlebih dahulu!');
                return;
            }

            // UI state loading
            scanBtn.disabled = true;
            scanBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memindai...';

            try {
                const url = `/api/gallery/photos?path=${encodeURIComponent(path)}&recursive=${recursive}`;
                const res = await fetch(url);
                const data = await res.json();

                if (data.error) {
                    alert('Error: ' + data.error);
                    scanBtn.disabled = false;
                    scanBtn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i> Pindai Folder Foto';
                    return;
                }

                currentPhotos = data.photos || [];
                renderPhotosGrid();

                // Update headers & counters
                document.getElementById('photo-count-badge').textContent = `${currentPhotos.length} Foto`;
                document.getElementById('current-scan-label').textContent = path;
                document.getElementById('gallery-header-title').textContent = `Foto di: ${path}`;

            } catch (err) {
                console.error(err);
                alert('Gagal memindai folder. Silakan cek console.');
            } finally {
                scanBtn.disabled = false;
                scanBtn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i> Pindai Folder Foto';
            }
        }

        // Render photo items into grid
        function renderPhotosGrid() {
            const container = document.getElementById('photos-container');
            const emptyState = document.getElementById('empty-state');

            if (currentPhotos.length === 0) {
                container.style.display = 'none';
                emptyState.style.display = 'flex';
                emptyState.innerHTML = `
                    <i class="fa-solid fa-image-slash"></i>
                    <div>
                        <h3>Tidak Ada Foto Ditemukan</h3>
                        <p style="margin-top:0.5rem">Folder tersebut kosong atau tidak mengandung file gambar (.jpg, .png, .gif, .webp, .bmp).</p>
                    </div>
                `;
                return;
            }

            emptyState.style.display = 'none';
            container.style.display = 'grid';

            container.innerHTML = currentPhotos.map((photo, index) => {
                // Securely view image via preview API
                const previewUrl = `/api/files/preview?path=${encodeURIComponent(photo.path)}`;
                return `
                    <div class="photo-item" onclick="openLightbox(${index})">
                        <img src="${previewUrl}" alt="${photo.name}" loading="lazy">
                        <div class="photo-info-overlay">
                            <span class="photo-name" title="${photo.name}">${photo.name}</span>
                            <div class="photo-meta">
                                <span>${photo.size} MB</span>
                                <span>${photo.mtime.split(' ')[0]}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Lightbox Functions
        function openLightbox(index) {
            activeIndex = index;
            const photo = currentPhotos[activeIndex];
            if (!photo) return;

            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            
            // Set values
            img.src = `/api/files/preview?path=${encodeURIComponent(photo.path)}`;
            document.getElementById('lb-filename').textContent = photo.name;
            document.getElementById('lb-meta').textContent = `${photo.display_path} • ${photo.size} MB • ${photo.mtime}`;

            // Reset Zoom
            resetZoom();

            // Open Modal
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden'; // block scroll
        }

        // Mouse pan / drag support inside lightbox
        let isDragging = false;
        let startX = 0;
        let startY = 0;
        let transformX = 0;
        let transformY = 0;
        const img = document.getElementById('lightbox-img');

        img.addEventListener('mousedown', (e) => {
            if (currentZoom === 1) return; // Only drag when zoomed
            isDragging = true;
            img.style.cursor = 'grabbing';
            startX = e.clientX - transformX;
            startY = e.clientY - transformY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            transformX = e.clientX - startX;
            transformY = e.clientY - startY;
            img.style.transform = `scale(${currentZoom}) translate(${transformX / currentZoom}px, ${transformY / currentZoom}px)`;
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            img.style.cursor = '';
        });

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            document.body.style.overflow = ''; // restore scroll
            activeIndex = -1;
        }

        function navigateLightbox(dir) {
            if (currentPhotos.length === 0 || activeIndex === -1) return;

            let newIndex = activeIndex + dir;
            if (newIndex < 0) newIndex = currentPhotos.length - 1;
            if (newIndex >= currentPhotos.length) newIndex = 0;

            openLightbox(newIndex);
        }

        // Download Image
        function downloadCurrentImage() {
            if (activeIndex === -1) return;
            const photo = currentPhotos[activeIndex];
            // Access server download endpoint
            const dlUrl = `/api/files/download?path=${encodeURIComponent(photo.path)}`;
            window.open(dlUrl, '_blank');
        }

        // Image Zoom controls
        function zoomImage(dir) {
            currentZoom += dir * 0.2;
            if (currentZoom < 0.4) currentZoom = 0.4;
            if (currentZoom > 4) currentZoom = 4;
            updateTransform();
        }

        function resetZoom() {
            currentZoom = 1;
            transformX = 0;
            transformY = 0;
            updateTransform();
        }

        function updateTransform() {
            img.style.transform = `scale(${currentZoom}) translate(${transformX / currentZoom}px, ${transformY / currentZoom}px)`;
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            const lb = document.getElementById('lightbox');
            if (!lb.classList.contains('active')) return;

            if (e.key === 'Escape') {
                closeLightbox();
            } else if (e.key === 'ArrowRight') {
                navigateLightbox(1);
            } else if (e.key === 'ArrowLeft') {
                navigateLightbox(-1);
            } else if (e.key === '=' || e.key === '+') {
                zoomImage(1);
            } else if (e.key === '-') {
                zoomImage(-1);
            }
        });

        // Initialize preset on load
        document.addEventListener('DOMContentLoaded', () => {
            // Check if default path can be loaded automatically
            loadPhotos();
        });
    </script>
</body>

</html>
